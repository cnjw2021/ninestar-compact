# 運用環境用サーバーブロック

# Docker 内部 DNS を使ってホスト名を再解決（コンテナ再起動でIPが変わっても追従）
resolver 127.0.0.11 ipv6=off valid=30s;

# フロント/バックエンドの upstream を宣言（状態共有 + keepalive）
upstream fe_upstream {
    zone fe_zone 64k;
    server frontend-container:3000 resolve;
    keepalive 32;
}

upstream be_upstream {
    zone be_zone 64k;
    server backend-container:5001 resolve;
    keepalive 32;
}

server {
    listen 80;
    server_name 831shop.site www.831shop.site;

    # 💡 Let's Encrypt 認証書更新用のlocationブロックを追加
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 831shop.site www.831shop.site;

    # SSL 証明書 パス (Certbotが自動生成)
    ssl_certificate /etc/letsencrypt/live/831shop.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/831shop.site/privkey.pem;

    # SSL セキュリティ強化設定 (推奨)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # フロントエンド プロキシ（upstream 利用）
    location / {
        # レート制限の適用: 静的リソースの同時読み込みを考慮してバーストを緩和
        limit_req zone=one burst=50 nodelay;
        proxy_pass http://fe_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket サポートのための設定
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # バックエンド API プロキシ（upstream 利用 + タイムアウト強化）
    location /api {
        # APIにもレート制限を適用 (APIはやや厳しめに)
        limit_req zone=one burst=30 nodelay;
        proxy_pass http://be_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}