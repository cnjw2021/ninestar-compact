<div class="relationship-type">
    <h4 class="relationship-title">
        <svg class="relationship-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" stroke="#FF5722" stroke-width="1.5"/>
            <path d="M12 3a4.5 4.5 0 0 0 0 9a4.5 4.5 0 0 1 0 9" stroke="#FF5722" stroke-width="1.5"/>
            <circle cx="12" cy="7.5" r=".5" fill="#FF5722"/>
            <circle cx="12" cy="16.5" r=".5" fill="#FF5722"/>
        </svg>
        <span class="relationship-text">相手を抑制し、試練を与える「相剋（そうこく）」の関係</span>
    </h4>
    <p>
        図の中央で星形を描く矢印は、一方の気がもう一方を抑制する関係を示します。例えば、水は火を消し、火は金を溶かすというように、要素同士が互いに制御し合う関係です。これを「相剋（そうこく）」と呼び、時として対立や困難を生みやすい緊張感のある相性です。
    </p>
    <p>
        相剋の相手とは、意見がぶつかったり、気疲れしやすかったりするかもしれません。しかし、この関係は必ずしもマイナスではありません。相手の存在が自分にない視点や成長の機会を与えてくれることもあります。相手の性質を理解し、適切な距離感を保つことが、良い関係を築く鍵となります。
    </p>
</div>
