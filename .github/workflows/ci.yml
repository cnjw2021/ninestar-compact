name: CI Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare mock environment files
        run: |
          touch frontend/.env.production.frontend
          touch frontend/.env.development.frontend

      - name: Build Docker containers
        run: docker compose build

      - name: Run Backend Tests
        run: make test
